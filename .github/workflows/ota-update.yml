name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Update message"
        required: false
        default: "Manual OTA update"
        type: string

concurrency:
  group: ota-update
  cancel-in-progress: true

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: eas update --branch preview --message "${{ inputs.message }}"
