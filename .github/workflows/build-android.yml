name: Build Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

concurrency:
  group: eas-build
  cancel-in-progress: false

jobs:
  build:
    name: EAS Build (${{ inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS Build (cloud)
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --no-wait
